name: bookish-env
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - scikit-learn=1.8.0
  - pandas
  - numpy
  - scipy
  - scikit-learn
  - requests
  - python-dotenv
  - pip
  - pip:
      - streamlit>=1.30.0
      - boto3
      - pyarrow>=18.0.0,<19.0.0
      - bcrypt
      - joblib
      - isbnlib
      - sodapy
      - pylint==4.0.4
      - pytest
      - build
