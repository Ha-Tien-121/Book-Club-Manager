name: deploy_ec2

on:
  workflow_run:
    workflows: ["build_test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_ROOT="/home/ec2-user/Book-Club-Manager"
            INNER_APP_DIR="/home/ec2-user/Book-Club-Manager/Book-Club-Manager"
            VENV_PY="/home/ec2-user/venv/bin/python"

            cd "$APP_ROOT"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            if [ ! -x "$VENV_PY" ]; then
              echo "Missing python venv at $VENV_PY"
              exit 1
            fi

            "$VENV_PY" -m pip install --upgrade pip
            "$VENV_PY" -m pip install -r requirements.txt

            # Optional: if your editable package install is required in runtime.
            "$VENV_PY" -m pip install -e "$APP_ROOT"

            sudo systemctl daemon-reload
            sudo systemctl restart bookclub-v2
            sudo systemctl is-active --quiet bookclub-v2

            # Quick smoke check from localhost through nginx.
            curl -fsS "http://127.0.0.1/" > /dev/null

            # Additional check: runtime storage mode should be cloud on EC2.
            cd "$INNER_APP_DIR"
            "$VENV_PY" - <<'PY'
            from backend import config
            from backend.storage import get_storage

            print("APP_ENV:", config.APP_ENV)
            print("IS_AWS:", config.IS_AWS)
            print("Storage:", type(get_storage()).__name__)
            if config.APP_ENV != "aws" or not config.IS_AWS or type(get_storage()).__name__ != "CloudStorage":
                raise SystemExit("Runtime not in expected AWS CloudStorage mode")
            PY
